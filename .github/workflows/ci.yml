name: CI

# Least-privilege: CI only reads the repo — no write access needed
permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x
            6.0.x

      - name: Restore
        run: dotnet restore src/Linguistics.slnx

      - name: Build (all frameworks)
        run: dotnet build src/Linguistics/Linguistics.csproj --configuration Release --no-restore

      - name: Vulnerability scan
        run: dotnet list src/Linguistics/Linguistics.csproj package --vulnerable --include-transitive

      # Resolve version dynamically from the last pushed tag (e.g. v1.0.0 → 1.0.0)
      # This ensures CI-only commits (no new tag) still produce a correctly versioned artifact
      - name: Resolve version from latest tag
        id: version
        run: |
          TAG=$(git describe --tags --abbrev=0)
          VERSION=${TAG#v}
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Pack
        run: dotnet pack src/Linguistics/Linguistics.csproj --configuration Release --output ./artifacts --no-build /p:MinVerVersionOverride=${{ steps.version.outputs.VERSION }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Linguistics-packages
          path: ./artifacts/
          # 7 is a safe minimum, to debug failed publish jobs
          retention-days: 7
