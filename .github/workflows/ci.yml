name: CI

# Least-privilege: CI only reads the repo — no write access needed
permissions:
  contents: read

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x
            6.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/SevenZipRunner.slnx

      - name: Build
        run: dotnet build src/SevenZipRunner/SevenZipRunner.csproj --configuration Release --no-restore


      - name: Vulnerability scan
        run: |
          dotnet list src/SevenZipRunner/SevenZipRunner.csproj package --vulnerable --include-transitive
          if [ $? -ne 0 ]; then exit 1; fi

      - name: Pack
        run: dotnet pack src/SevenZipRunner/SevenZipRunner.csproj --configuration Release --output ./artifacts --no-build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: SevenZipRunner-packages
          path: ./artifacts/
          retention-days: 7
