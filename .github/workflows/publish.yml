name: Publish to NuGet.org

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            10.0.x
            9.0.x
            8.0.x
            7.0.x
            6.0.x

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/packages.lock.json') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Restore
        run: dotnet restore src/SevenZipRunner.slnx

      - name: Build
        run: dotnet build src/SevenZipRunner/SevenZipRunner.csproj --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/SevenZipRunner/SevenZipRunner.csproj --configuration Release --output ./artifacts --no-build

      - name: NuGet login (OIDC → temp API key)
        uses: NuGet/login@v1
        id: login
        with:
          user: ahmadmdabit

      - name: Push to NuGet.org (Trusted Publishing)
        run: |
          for pkg in ./artifacts/*.nupkg ./artifacts/*.snupkg; do
            dotnet nuget push "$pkg" \
              --api-key ${{ steps.login.outputs.NUGET_API_KEY }} \
              --source https://api.nuget.org/v3/index.json \
              --skip-duplicate
          done
